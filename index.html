<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="/StockTracker/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="WealthTracker - Track Today. Grow Tomorrow. Built with ❤️ by Solo Rash">

  <!-- Cache Control Meta Tags -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />

  <!-- Force unregister old Flutter PWA service workers & clear browser CacheStorage -->
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function(registrations) {
        for (let registration of registrations) {
          registration.unregister();
        }
      });
    }
    if ('caches' in window) {
      caches.keys().then(function(names) {
        for (let name of names) {
          caches.delete(name);
        }
      });
    }
  </script>

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="WealthTracker">
  <link rel="apple-touch-icon" href="solorash_logo.jpg">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="splash_bg.png"/>

  <title>WealthTracker by Solo Rash</title>
  <link rel="manifest" href="manifest.json">

  <style>
    body {
      background-color: #070B12;
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      color: #FFFFFF;
      overflow: hidden;
    }
    .splash-container {
      position: relative;
      width: 100vw;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background-color: #070B12;
    }
    .splash-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
    }
    .spinner-bar {
      position: absolute;
      bottom: 24px;
      width: 160px;
      height: 3px;
      background: rgba(255, 255, 255, 0.15);
      border-radius: 4px;
      overflow: hidden;
    }
    .spinner-bar::after {
      content: '';
      position: absolute;
      left: -50%;
      height: 100%;
      width: 50%;
      background: linear-gradient(90deg, #00E676, #00E5FF);
      border-radius: 4px;
      animation: loadingAnim 1.5s infinite ease-in-out;
    }
    @keyframes loadingAnim {
      0% { left: -50%; width: 30%; }
      50% { width: 60%; }
      100% { left: 100%; width: 30%; }
    }
  </style>
</head>
<body>
  <!-- Initial Web HTML Splash Container featuring User Artwork -->
  <div id="splash" class="splash-container">
    <img src="splash_bg.png" alt="WealthTracker Splash" class="splash-img">
    <div class="spinner-bar"></div>
  </div>

  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
